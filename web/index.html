<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ncmdump 转换器</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>ncmdump 转换器</h1>

        <section>
            <h2>单个文件转换</h2>
            <form id="singleForm" enctype="multipart/form-data">
                <label>单个 .ncm 文件</label>
                <div class="row">
                    <button type="button" onclick="triggerSingleFile()">选择单个文件</button>
                    <span id="singleFileName">尚未选择文件</span>
                </div>
                <input type="file" id="singleInput" name="file" accept=".ncm" required style="display:none">

                <label>输出目标文件夹</label>
                <div class="row">
                    <input type="text" id="singleTarget" name="target" value="{{.DefaultDir}}" required>
                    <button type="button" onclick="chooseTargetFolder()">选择目标文件夹</button>
                </div>

                <button type="button" onclick="submitSingle()">转换文件</button>
            </form>
        </section>

        <section>
            <h2>批量转换</h2>
            <form id="batchForm" enctype="multipart/form-data">
                <label>选择文件夹（会上传该文件夹里的所有 .ncm 文件）</label>
                <div class="row">
                    <button type="button" onclick="triggerFolderInput()">选择文件夹</button>
                    <span id="batchFileName">尚未选择文件夹</span>
                </div>
                <input type="file" id="folderInput" name="files" webkitdirectory directory multiple accept=".ncm" style="display:none">
                <small>提示：该控件在 Chrome/Edge 上可用。</small>

                <label>并发转换数量</label>
                <input type="number" id="batchConcurrency" name="concurrency" min="1" max="100" value="10" required>

                <label>转换进度</label>
                <div class="progress-box">
                    <progress id="batchProgress" value="0" max="100"></progress>
                    <span id="batchProgressText">0%</span>
                </div>

                <label>输出目标文件夹</label>
                <div class="row">
                    <input type="text" id="batchTarget" name="target" value="{{.DefaultDir}}" required>
                    <button type="button" onclick="chooseTargetFolder()">选择目标文件夹</button>
                </div>

                <button type="button" onclick="submitBatch()">转换文件夹</button>
            </form>
        </section>

        <section>
            <h2>日志输出</h2>
            <pre id="log">等待操作...</pre>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
